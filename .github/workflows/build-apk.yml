name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗️ Run Expo Prebuild (generate Android folder)
        run: npx expo prebuild --platform android --clean --no-install

      - name: 🔐 Make Gradle Wrapper executable
        run: chmod +x android/gradlew

      - name: 🏗️ Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: marketmind-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "## ✅ MarketMind APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
          echo "Install it on Android by enabling **Unknown Sources**." >> $GITHUB_STEP_SUMMARY
