name: Build Android APK (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗️ Expo Prebuild (generate native Android project)
        run: npx expo prebuild --platform android --clean --no-install

      - name: 📁 Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: 📦 Bundle JavaScript (PRODUCTION — no Metro needed)
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.ts \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/ \
            --reset-cache

      - name: 🔐 Generate Release Keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/marketmind-release.keystore \
            -alias marketmind \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass marketmind123 \
            -keypass marketmind123 \
            -dname "CN=MarketMind, OU=App, O=MarketMind, L=Paris, ST=IDF, C=FR"

      - name: 🔐 Configure gradle.properties signing
        run: |
          cat >> android/gradle.properties << 'EOF'
          MARKETMIND_STORE_FILE=marketmind-release.keystore
          MARKETMIND_STORE_PASSWORD=marketmind123
          MARKETMIND_KEY_ALIAS=marketmind
          MARKETMIND_KEY_PASSWORD=marketmind123
          EOF

      - name: 🔐 Patch build.gradle with signing config
        working-directory: android/app
        run: |
          python3 - << 'PYEOF'
          import re

          with open('build.gradle', 'r') as f:
              content = f.read()

          # Add signingConfigs block before android { block's buildTypes
          signing_block = '''
              signingConfigs {
                  release {
                      storeFile file(MARKETMIND_STORE_FILE)
                      storePassword MARKETMIND_STORE_PASSWORD
                      keyAlias MARKETMIND_KEY_ALIAS
                      keyPassword MARKETMIND_KEY_PASSWORD
                  }
              }
          '''

          # Insert before buildTypes
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_block + '    buildTypes {', 1)

          # Patch release build type to use signing config
          content = re.sub(
              r'(release\s*\{[^}]*?)(\s*\})',
              lambda m: m.group(1) + '\n            signingConfig signingConfigs.release\n            minifyEnabled false\n        ' + m.group(2).strip(),
              content,
              count=1,
              flags=re.DOTALL
          )

          with open('build.gradle', 'w') as f:
              f.write(content)

          print("✅ build.gradle patched")
          PYEOF

      - name: 🔧 Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: 🏗️ Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: ✅ Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/release/
          echo "APK size: $(du -sh android/app/build/outputs/apk/release/app-release.apk | cut -f1)"

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MarketMind-Production.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          APK_SIZE=$(du -sh android/app/build/outputs/apk/release/app-release.apk | cut -f1)
          echo "## ✅ MarketMind Production APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY  
          echo "| Build Mode | Release (Production) |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Bundle | Embedded inside APK ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Metro Required | ❌ No — works fully offline |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download from **Artifacts** section above" >> $GITHUB_STEP_SUMMARY
